jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2 
          cache-overwrite-existing: true

      - name: 🖼️ Generate Android Icons
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          if [ -f "icon_master.png" ]; then
            python3 scripts/generate_icons.py icon_master.png
          else
            convert -size 512x512 xc:blue icon_master.png
            python3 scripts/generate_icons.py icon_master.png
          fi

      - name: 🧹 Pre-Sanitize Legacy Source
        run: |
          # Static patches that don't require the build environment
          python3 scripts/sanitize_legacy_code.py .
          if [ -f "scripts/patch_array_initializations.py" ]; then
            python3 scripts/patch_array_initializations.py .
          fi

      - name: 🔨 Iterative Build (Dynamic Corrector)
        run: |
          # 1. Critical: Grant execution permission to the Gradle wrapper
          chmod +x Android/gradlew
          
          # 2. Run the dynamic corrector
          # It will loop: Build -> Parse Errors -> Fix Source -> Rebuild
          python3 scripts/dynamic_corrector.py
          
          # 3. Move the final log to the root for the upload step
          mv Android/full_build_log.txt ./full_build_log.txt

      - name: 📦 Upload Full Error Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-compilation-logs
          path: full_build_log.txt
          retention-days: 3

      - name: 📦 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: banjo-android-debug
          path: Android/app/build/outputs/apk/debug/*.apk
