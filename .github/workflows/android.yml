name: Android Build Pipeline
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2 

      - name: 🧹 Pre-Patching
        run: |
          python3 scripts/sanitize_legacy_code.py .
          python3 scripts/patch_array_initializations.py .

      - name: 🤖 Automated Correction & Build Loop
        # This script runs the build internally 15 times if needed
        run: python3 scripts/dynamic_corrector.py

      - name: 📦 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compilation-logs
          path: Android/full_build_log.txt

      - name: 📦 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: banjo-android-debug
          path: Android/app/build/outputs/apk/debug/*.apk
