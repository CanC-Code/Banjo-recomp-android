name: Android Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # This installs Gradle at runtime since you don't have the wrapper
          gradle-version: 8.2 
          # This automatically caches ~/.gradle/caches and ~/.gradle/wrapper
          cache-overwrite-existing: true

      - name: 🔨 Build APK
        # We use 'gradle' (system) instead of './gradlew' (wrapper)
        # We point it to the Android subfolder
        run: |
          cd Android
          gradle assembleDebug --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: banjo-android-debug
          path: Android/app/build/outputs/apk/debug/*.apk
