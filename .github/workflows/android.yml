name: Android Build Pipeline

on:
  # Trigger only manually from the "Actions" tab
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🖼️ Generate Android Icons
        run: |
          # Ensure ImageMagick is ready (convert/magick)
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Run your generator script. 
          # Change 'icon_master.png' to the actual path of your high-res logo.
          if [ -f "icon_master.png" ]; then
            python3 scripts/generate_icons.py icon_master.png
          else
            echo "⚠️ icon_master.png not found! Creating a placeholder to prevent AAPT error..."
            # Create a 512x512 blue placeholder if you forgot to upload the master icon
            convert -size 512x512 xc:blue icon_master.png
            python3 scripts/generate_icons.py icon_master.png
          fi

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2 
          cache-overwrite-existing: true

      - name: 🔨 Build APK
        run: |
          cd Android
          gradle assembleDebug --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: banjo-android-debug
          path: Android/app/build/outputs/apk/debug/*.apk
